version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: streamscale-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: streamscale
      POSTGRES_USER: streamscale
      POSTGRES_PASSWORD: streamscale
    ports:
      - "5432:5432"
    volumes:
      - streamscale_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: streamscale-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: streamscale
      MINIO_ROOT_PASSWORD: streamscale123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - streamscale_minio_data:/data

volumes:
  streamscale_postgres_data:
  streamscale_minio_data: